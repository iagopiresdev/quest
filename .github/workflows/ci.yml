name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-platform:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

  validate:
    name: validate
    runs-on: ubuntu-latest
    needs:
      - validate-platform
    if: always()

    steps:
      - name: Require platform validation
        if: needs.validate-platform.result != 'success'
        run: exit 1

      - name: Mark validation complete
        run: echo "platform validation passed"
