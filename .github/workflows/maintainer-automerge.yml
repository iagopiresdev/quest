name: Maintainer Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: maintainer-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable:
    name: Enable auto-merge
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash --delete-branch --match-head-commit "$HEAD_SHA"

  disable:
    name: Disable auto-merge when intent is removed
    if: >
      (github.event.action == 'unlabeled' && github.event.label.name == 'automerge') ||
      github.event.action == 'converted_to_draft'
    runs-on: ubuntu-latest
    steps:
      - name: Disable GitHub auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --disable-auto || true
